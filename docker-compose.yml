services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmguard-backend
    env_file:
      - ./backend/.env
    environment:
      SQLITE_PATH: /data/db.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - backend_sqlite:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000/api}
    container_name: farmguard-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  backend_sqlite:
